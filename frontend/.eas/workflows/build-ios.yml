name: Build and submit iOS (manual)

# MANUAL TRIGGER ONLY — pushes do NOT auto-build (avoids surprise EAS charges).
# Run this from the Expo dashboard (Workflows -> Run workflow) or 'eas workflow:run',
# only when a new TestFlight build is actually wanted.
on:
  workflow_dispatch: {}

jobs:
  build_ios:
    name: Build iOS app
    type: build
    params:
      platform: ios
      profile: production
  submit_ios:
    name: Submit to TestFlight
    needs: [build_ios]
    type: submit
    params:
      platform: ios
      profile: production
      build_id: ${{ needs.build_ios.outputs.build_id }}
