# Railway service configuration for Convoy API.
# Pair with nixpacks.toml above to install ffmpeg.
#
# To deploy:
#   1. Push the /backend folder to a GitHub repo
#   2. Railway → New Project → Deploy from GitHub repo → pick this repo
#   3. Railway auto-detects nixpacks.toml + requirements.txt
#   4. Add the env vars from .env.example in the Railway dashboard
#   5. Add a MongoDB plugin (Railway → New → Database → MongoDB)
#   6. Copy the MONGO_URL from the plugin into your service's env

[deploy]
# Restart on failure up to 3 times before declaring the service degraded.
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
# Health-check probes /api/health every 30s. Convoy returns 200 from
# that route in <50ms — well under Railway's default 10s timeout.
healthcheckPath = "/api/health"
healthcheckTimeout = 30

[build]
builder = "HEROKU"
