name: Build and submit (iOS + Android)

on:
  push:
    branches:
      - main

jobs:
  build_ios:
    name: Build iOS app
    type: build
    params:
      platform: ios
      profile: production
  submit_ios:
    name: Submit to TestFlight
    needs: [build_ios]
    type: submit
    params:
      platform: ios
      profile: production
      build_id: ${{ needs.build_ios.outputs.build_id }}

  build_android:
    name: Build Android app
    type: build
    params:
      platform: android
      profile: production

  # ── Android submit is DISABLED until a Google service account key is added to
  # ── EAS (Credentials → Android → "Google service account key for EAS Submit")
  # ── AND the first .aab has been uploaded manually in the Play Console once.
  # ── Uncomment this block after both are done.
